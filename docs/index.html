<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Baby Names</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/css/tabulator_simple.min.css"
    />
    <style>
      :root {
        --pico-font-size: 15px;
      }
      [data-theme="dark"] {
        --filter-bg: #1a1a2e;
        --filter-border: #333;
        --chip-bg: #2a2a3e;
        --chip-active: var(--pico-primary);
        --badge-bg: #333;
      }
      [data-theme="light"] {
        --filter-bg: #f8f9fa;
        --filter-border: #dee2e6;
        --chip-bg: #e9ecef;
        --chip-active: var(--pico-primary);
        --badge-bg: #e9ecef;
      }
      body {
        padding-top: 0;
      }
      nav.top-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--pico-background-color);
        border-bottom: 1px solid var(--filter-border);
        padding: 0.5rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      nav.top-nav h1 {
        margin: 0;
        font-size: 1.3rem;
      }
      nav.top-nav .nav-links {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }
      nav.top-nav a {
        font-size: 0.85rem;
      }
      .filter-panel {
        background: var(--filter-bg);
        border: 1px solid var(--filter-border);
        border-radius: 8px;
        padding: 1rem;
        margin: 1rem 0;
      }
      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: flex-end;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .filter-group label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0;
      }
      .filter-group select,
      .filter-group input[type="number"] {
        padding: 0.3rem 0.5rem;
        font-size: 0.85rem;
        margin: 0;
        height: auto;
      }
      .filter-group input[type="number"] {
        width: 5rem;
      }
      .letter-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.2rem;
      }
      .letter-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.8rem;
        height: 1.8rem;
        font-size: 0.75rem;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        background: var(--chip-bg);
        border: 1px solid transparent;
        color: var(--pico-color);
        transition: all 0.15s;
      }
      .letter-chip:hover {
        border-color: var(--pico-primary);
      }
      .letter-chip.active {
        background: var(--chip-active);
        color: #fff;
      }
      .gender-btn {
        padding: 0.3rem 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.15s;
      }
      .gender-btn.boys {
        background: #e3f2fd;
        color: #1565c0;
      }
      .gender-btn.boys.active {
        background: #1565c0;
        color: #fff;
      }
      .gender-btn.girls {
        background: #fce4ec;
        color: #c62828;
      }
      .gender-btn.girls.active {
        background: #c62828;
        color: #fff;
      }
      .toggle-group {
        display: flex;
        gap: 0.25rem;
      }
      .toggle-btn {
        padding: 0.3rem 0.7rem;
        font-size: 0.8rem;
        border-radius: 4px;
        cursor: pointer;
        background: var(--chip-bg);
        border: 1px solid transparent;
        color: var(--pico-color);
        transition: all 0.15s;
      }
      .toggle-btn:hover {
        border-color: var(--pico-primary);
      }
      .toggle-btn.active {
        background: var(--chip-active);
        color: #fff;
      }
      .stats-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0;
        font-size: 0.85rem;
        color: var(--pico-muted-color);
      }
      .stats-bar .count {
        font-weight: 600;
        color: var(--pico-color);
      }
      .clear-btn {
        font-size: 0.8rem;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--pico-primary);
        text-decoration: underline;
        padding: 0;
      }
      .clear-btn:hover {
        color: var(--pico-primary-hover);
      }
      #table-container {
        margin-bottom: 2rem;
      }
      .loading {
        text-align: center;
        padding: 3rem;
        color: var(--pico-muted-color);
      }
      @media (max-width: 768px) {
        .filter-panel {
          padding: 0.75rem;
        }
        .filter-row {
          gap: 0.5rem;
        }
        .letter-chips {
          max-height: 3.8rem;
          overflow: hidden;
        }
        .letter-chips.expanded {
          max-height: none;
        }
        nav.top-nav .nav-links {
          font-size: 0.8rem;
        }
      }

      /* Tabulator dark mode overrides */
      [data-theme="dark"] .tabulator {
        background-color: var(--pico-background-color);
        color: var(--pico-color);
        border-color: var(--filter-border);
      }
      [data-theme="dark"] .tabulator .tabulator-header {
        background-color: #1a1a2e;
        color: var(--pico-color);
        border-color: var(--filter-border);
      }
      [data-theme="dark"]
        .tabulator
        .tabulator-header
        .tabulator-col
        .tabulator-col-content {
        color: var(--pico-color);
      }
      [data-theme="dark"] .tabulator .tabulator-header .tabulator-col {
        background-color: #1a1a2e;
        border-color: var(--filter-border);
      }
      [data-theme="dark"] .tabulator .tabulator-tableholder .tabulator-table .tabulator-row {
        background-color: var(--pico-background-color);
        color: var(--pico-color);
      }
      [data-theme="dark"]
        .tabulator
        .tabulator-tableholder
        .tabulator-table
        .tabulator-row:hover {
        background-color: #2a2a3e;
      }
      [data-theme="dark"]
        .tabulator
        .tabulator-tableholder
        .tabulator-table
        .tabulator-row
        .tabulator-cell {
        border-color: var(--filter-border);
      }
      [data-theme="dark"]
        .tabulator
        .tabulator-tableholder
        .tabulator-table
        .tabulator-row.tabulator-row-even {
        background-color: #161625;
      }
      [data-theme="dark"] .tabulator .tabulator-footer {
        background-color: #1a1a2e;
        color: var(--pico-color);
        border-color: var(--filter-border);
      }
      [data-theme="dark"] .tabulator .tabulator-footer .tabulator-page {
        color: var(--pico-color);
        border-color: var(--filter-border);
      }
      [data-theme="dark"] .tabulator .tabulator-footer .tabulator-page.active {
        background-color: var(--pico-primary);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <nav class="top-nav">
      <h1>Baby Names</h1>
      <div class="nav-links">
        <a href="https://github.com/dxdc/babynames">GitHub</a>
        <a href="boys.csv" download>Boys CSV</a>
        <a href="girls.csv" download>Girls CSV</a>
        <a
          href="https://raw.githubusercontent.com/dxdc/babynames/main/all-names.csv"
          download
          >All CSV</a
        >
        <button
          id="theme-toggle"
          class="toggle-btn"
          title="Toggle dark mode"
          aria-label="Toggle dark mode"
        >
          Dark
        </button>
      </div>
    </nav>

    <main class="container-fluid" style="padding: 0 1rem">
      <div class="filter-panel">
        <div class="filter-row">
          <div class="filter-group">
            <label>Gender</label>
            <div class="toggle-group">
              <button class="gender-btn boys active" data-gender="M">
                Boys
              </button>
              <button class="gender-btn girls" data-gender="F">Girls</button>
            </div>
          </div>

          <div class="filter-group">
            <label>Search</label>
            <input
              type="text"
              id="name-search"
              placeholder="Name..."
              style="width: 8rem"
            />
          </div>

          <div class="filter-group">
            <label>Rank</label>
            <select id="rank-filter">
              <option value="">All</option>
              <option value="100">Top 100</option>
              <option value="500">Top 500</option>
              <option value="1000">Top 1,000</option>
              <option value="5000">Top 5,000</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Syllables</label>
            <select id="syllable-filter">
              <option value="">All</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4+</option>
            </select>
          </div>

          <div class="filter-group">
            <label>Year Min</label>
            <input type="number" id="year-min" placeholder="1880" min="1880" />
          </div>

          <div class="filter-group">
            <label>Year Max</label>
            <input type="number" id="year-max" placeholder="2023" max="2100" />
          </div>

          <div class="filter-group">
            <label>Biblical</label>
            <div class="toggle-group">
              <button class="toggle-btn filter-toggle" data-filter="biblical">
                Biblical
              </button>
            </div>
          </div>

          <div class="filter-group">
            <label>Unisex</label>
            <div class="toggle-group">
              <button class="toggle-btn filter-toggle" data-filter="unisex">
                Unisex
              </button>
            </div>
          </div>

          <div class="filter-group">
            <label>&nbsp;</label>
            <button class="clear-btn" id="clear-filters">Clear All</button>
          </div>
        </div>

        <div class="filter-group" style="margin-top: 0.75rem">
          <label>Starting Letter</label>
          <div class="letter-chips" id="letter-chips"></div>
        </div>
      </div>

      <div class="stats-bar">
        <span
          >Showing <span class="count" id="shown-count">0</span> of
          <span class="count" id="total-count">0</span> names</span
        >
      </div>

      <div id="table-container">
        <div class="loading" id="loading">Loading baby names...</div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.2/papaparse.min.js"></script>
    <script src="grid.js"></script>
  </body>
</html>
