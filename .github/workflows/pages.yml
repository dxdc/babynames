name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "grid.js"
      - "swipe.js"
      - "manifest.json"
      - "data/*.csv"
      - "images/*.png"
      - "CNAME"
  workflow_run:
    workflows: ["Generate Data"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip if triggered by a failed Generate Data run
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare deploy directory
        run: |
          mkdir -p _site/data _site/images
          cp index.html grid.js swipe.js manifest.json .nojekyll _site/
          cp CNAME _site/ 2>/dev/null || true
          cp data/*.csv _site/data/
          for img in graph.png venmo.png og-image.png; do
            [ -f "images/$img" ] && cp "images/$img" _site/images/
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
