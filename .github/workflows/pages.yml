name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "grid.js"
      - "swipe.js"
      - "data/*.csv"
      - "CNAME"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare deploy directory
        run: |
          mkdir -p _site/data _site/images
          cp index.html grid.js swipe.js .nojekyll _site/
          cp CNAME _site/ 2>/dev/null || true
          cp data/*.csv _site/data/
          cp images/graph.png images/venmo.png _site/images/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
