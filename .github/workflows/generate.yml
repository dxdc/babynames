name: Generate CSVs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "raw/**"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install polars cmudict
      - name: Generate CSVs
        run: python src/babynames.py --verbose
      - name: Check for changes
        id: diff
        run: |
          git diff --stat
          echo "changed=$(git diff --name-only | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit updated CSVs
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git commit -m "chore: regenerate CSV output"
          git push
