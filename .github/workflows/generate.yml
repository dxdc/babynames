name: Generate CSVs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "raw/**"
      - "images/generate_graph.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install polars cmudict matplotlib==3.9.* g2p-en
      - name: Download NLTK data for g2p-en
        run: python -c "import nltk; nltk.download('cmudict', quiet=True); nltk.download('averaged_perceptron_tagger_eng', quiet=True)"
      - name: Generate CSVs
        run: python src/babynames.py --verbose
      - name: Generate distribution graph
        run: python images/generate_graph.py
      - name: Check for changes
        id: diff
        run: |
          git diff --stat
          echo "changed=$(git diff --name-only | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit updated outputs
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv images/graph.png
          git commit -m "chore: regenerate CSV output and graph"
          git push
